# ═══════════════════════════════════════════════════════════════
# AILife Backend - Docker Compose
# ═══════════════════════════════════════════════════════════════
# 使用方法:
#   docker-compose up -d          启动所有服务
#   docker-compose down           停止并移除容器
#   docker-compose logs -f api    查看 API 日志
#   docker-compose build          重新构建镜像
# ═══════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── API 服务 ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ailife-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # 数据持久化：音频文件、数据库等
      - ./data:/app/data
      # 开发模式：挂载代码目录实现热重载
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 如需 GPU 支持（Whisper 加速），取消下方注释
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── 可选：自建 PostgreSQL + pgvector ──────────────────────
